name: UAT Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # Run nightly at 2 AM

jobs:
  uat-tests:
    runs-on: ubuntu-latest
    container:
      image: docker:latest
    services:
      docker:
        image: docker:dind
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Stack
        run: docker compose build
      
      - name: Start Services
        run: docker compose up -d
      
      - name: Wait for Services
        run: sleep 30
      
      - name: Run Infrastructure Tests
        run: bash tests/uat_01_infrastructure.sh || true
      
      - name: Run Security Tests
        run: bash tests/uat_02_security.sh || true
      
      - name: Run File Operation Tests
        run: bash tests/uat_03_file_operations.sh || true
      
      - name: Run Network Tests
        run: bash tests/uat_05_network.sh || true
      
      - name: Results
        run: |
          echo "UAT Test Summary"
          docker compose ps
          docker logs aetheris_core || true
      
      - name: Stop Services
        if: always()
        run: docker compose down -v

  report:
    needs: uat-tests
    runs-on: ubuntu-latest
    steps:
      - name: Generate Report
        run: |
          echo "# Aetheris UAT Report" > UAT_REPORT.md
          echo "Date: $(date)" >> UAT_REPORT.md
          echo "Status: Tests Completed" >> UAT_REPORT.md
      
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: uat-report
          path: UAT_REPORT.md
